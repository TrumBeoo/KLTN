<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Rentify</title>
  
  <link rel="stylesheet" href="../css/auth-styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="auth-page">
  
  <a href="index.html" class="auth-back-home">
    <i class="bi bi-arrow-left"></i>
    <span>Trang chủ</span>
  </a>
  
  <div class="auth-container">
    
    <!-- Brand Section (Left) -->
    <div class="auth-brand-section">
      <div class="auth-brand-content">
        
        <div class="auth-logo">
          <div class="auth-logo-icon">🏠</div>
          <div class="auth-logo-text">Rentify</div>
        </div>
        
        <h1 class="auth-brand-title">Bắt đầu hành trình của bạn</h1>
        
        <p class="auth-brand-desc">
          Tạo tài khoản để truy cập hệ thống quản lý phòng trọ thông minh
        </p>
        
        <div class="auth-brand-illustration">
          <i class="bi bi-people"></i>
        </div>
        
      </div>
    </div>
    
    <!-- Form Section (Right) -->
    <div class="auth-form-section">
      <div class="auth-card">
        
        <div class="auth-card-header">
          <h2 class="auth-card-title">Đăng ký tài khoản</h2>
          <p class="auth-card-subtitle">Điền thông tin để bắt đầu</p>
        </div>
        
        <!-- Alert -->
        <div class="auth-alert auth-alert-error" id="errorAlert" style="display: none;">
          <i class="bi bi-exclamation-circle auth-alert-icon"></i>
          <div id="errorMessage"></div>
        </div>
        
        <form class="auth-form" id="registerForm">
          
          <!-- Username -->
          <div class="auth-form-group">
            <label class="auth-label">Tên đăng nhập *</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-person auth-input-icon"></i>
              <input 
                type="text" 
                class="auth-input" 
                id="usernameInput"
                placeholder="username"
                required
              >
            </div>
          </div>
          
          <!-- Full Name -->
          <div class="auth-form-group">
            <label class="auth-label">Họ và tên *</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-person auth-input-icon"></i>
              <input 
                type="text" 
                class="auth-input" 
                id="fullNameInput"
                placeholder="Nguyễn Văn A"
                required
              >
            </div>
          </div>
          
          <!-- Email -->
          <div class="auth-form-group">
            <label class="auth-label">Email *</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-envelope auth-input-icon"></i>
              <input 
                type="email" 
                class="auth-input" 
                id="emailInput"
                placeholder="your@email.com"
                required
              >
            </div>
          </div>
          
          <!-- Phone -->
          <div class="auth-form-group">
            <label class="auth-label">Số điện thoại *</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-telephone auth-input-icon"></i>
              <input 
                type="tel" 
                class="auth-input" 
                id="phoneInput"
                placeholder="0912 345 678"
                required
              >
            </div>
          </div>
          
          <!-- Role Selection -->
          <div class="auth-form-group">
            <label class="auth-label">Bạn là? *</label>
            <div class="auth-role-selector">
              
              <div class="auth-role-option">
                <input 
                  type="radio" 
                  name="role" 
                  value="Tenant" 
                  id="roleTenant"
                  class="auth-role-input"
                  checked
                >
                <label for="roleTenant" class="auth-role-label">
                  <i class="bi bi-person-check auth-role-icon"></i>
                  <div class="auth-role-name">Người thuê</div>
                  <div class="auth-role-desc">Tìm và thuê phòng trọ</div>
                </label>
              </div>
              
              <div class="auth-role-option">
                <input 
                  type="radio" 
                  name="role" 
                  value="Landlord" 
                  id="roleLandlord"
                  class="auth-role-input"
                >
                <label for="roleLandlord" class="auth-role-label">
                  <i class="bi bi-building auth-role-icon"></i>
                  <div class="auth-role-name">Chủ nhà</div>
                  <div class="auth-role-desc">Quản lý phòng trọ</div>
                </label>
              </div>
              
            </div>
          </div>
          
          <!-- Password -->
          <div class="auth-form-group">
            <label class="auth-label">Mật khẩu *</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-lock auth-input-icon"></i>
              <input 
                type="password" 
                class="auth-input" 
                id="passwordInput"
                placeholder="Tối thiểu 6 ký tự"
                required
              >
              <button type="button" class="auth-password-toggle" id="togglePassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <!-- Password Strength -->
            <div class="password-strength">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <div class="strength-text" id="strengthText">Độ mạnh: Chưa nhập</div>
          </div>
          
          <!-- Confirm Password -->
          <div class="auth-form-group">
            <label class="auth-label">Xác nhận mật khẩu *</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-lock-fill auth-input-icon"></i>
              <input 
                type="password" 
                class="auth-input" 
                id="confirmPasswordInput"
                placeholder="Nhập lại mật khẩu"
                required
              >
              <button type="button" class="auth-password-toggle" id="toggleConfirmPassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="auth-error-message" id="passwordMatchError" style="display: none;">
              <i class="bi bi-exclamation-circle"></i>
              <span>Mật khẩu không khớp</span>
            </div>
          </div>
          
          <!-- Terms -->
          <label class="auth-checkbox" style="margin-top: -0.5rem;">
            <input type="checkbox" id="termsCheckbox" required>
            <span style="font-size: 0.8125rem;">
              Tôi đồng ý với 
              <a href="#" class="auth-link">Điều khoản sử dụng</a> 
              và 
              <a href="#" class="auth-link">Chính sách bảo mật</a>
            </span>
          </label>
          
          <!-- Submit Button -->
          <button type="submit" class="auth-btn auth-btn-primary">
            <span>Tạo tài khoản</span>
            <i class="bi bi-arrow-right"></i>
          </button>
          
          <!-- Divider -->
          <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">Hoặc đăng ký với</span>
            <div class="auth-divider-line"></div>
          </div>
          
          <!-- Google Register -->
          <button type="button" class="auth-btn auth-btn-google">
            <svg width="20" height="20" viewBox="0 0 20 20">
              <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
              <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
              <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
              <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
            </svg>
            <span>Đăng ký với Google</span>
          </button>
          
        </form>
        
        <!-- Footer Link -->
        <div class="auth-footer">
          Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
        
      </div>
    </div>
    
  </div>
  
  <script src="../js/auth-script.js"></script>
  <script src="../js/auth-state.js"></script>
  <script>
    const passwordInput = document.getElementById('passwordInput');
    const strengthBars = document.querySelectorAll('.strength-bar');
    const strengthText = document.getElementById('strengthText');
    
    passwordInput.addEventListener('input', function() {
      const password = this.value;
      let strength = 0;
      
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      
      strengthBars.forEach((bar, index) => {
        bar.classList.remove('active', 'weak', 'medium', 'strong');
        if (index < strength) {
          bar.classList.add('active');
          if (strength <= 2) bar.classList.add('weak');
          else if (strength <= 3) bar.classList.add('medium');
          else bar.classList.add('strong');
        }
      });
      
      const texts = ['Chưa nhập', 'Yếu', 'Yếu', 'Trung bình', 'Mạnh', 'Rất mạnh'];
      strengthText.textContent = `Độ mạnh: ${texts[strength]}`;
      strengthText.style.color = strength <= 2 ? 'var(--auth-error)' : 
                                  strength <= 3 ? 'var(--auth-warning)' : 
                                  'var(--auth-success)';
    });
    
    const confirmPasswordInput = document.getElementById('confirmPasswordInput');
    const passwordMatchError = document.getElementById('passwordMatchError');
    
    confirmPasswordInput.addEventListener('input', function() {
      if (this.value && this.value !== passwordInput.value) {
        passwordMatchError.style.display = 'flex';
        this.classList.add('error');
      } else {
        passwordMatchError.style.display = 'none';
        this.classList.remove('error');
      }
    });
    
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('usernameInput').value;
      const name = document.getElementById('fullNameInput').value;
      const email = document.getElementById('emailInput').value;
      const phone = document.getElementById('phoneInput').value;
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const role = document.querySelector('input[name="role"]:checked').value;
      const termsAccepted = document.getElementById('termsCheckbox').checked;
      
      if (password !== confirmPassword) {
        passwordMatchError.style.display = 'flex';
        confirmPasswordInput.classList.add('error');
        return;
      }
      
      if (!termsAccepted) {
        alert('Vui lòng đồng ý với Điều khoản sử dụng');
        return;
      }
      
      document.getElementById('errorAlert').style.display = 'none';
      
      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Đang tạo tài khoản...';
      
      try {
        const response = await fetch('../../backend/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, name, email, phone, password, role })
        });
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.message || 'Đăng ký thất bại');
        }
        
        showToast('Đăng ký thành công! Đang chuyển đến trang đăng nhập...', 'success');
        setTimeout(() => {
          window.location.href = 'login.html?registered=true';
        }, 2000);
        
      } catch (error) {
        document.getElementById('errorMessage').textContent = error.message;
        document.getElementById('errorAlert').style.display = 'flex';
        
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Tạo tài khoản</span><i class="bi bi-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
