<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Rentify</title>
  
  <link rel="stylesheet" href="../css/auth-styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="auth-page">
  
  <a href="index.html" class="auth-back-home">
    <i class="bi bi-arrow-left"></i>
    <span>Trang chủ</span>
  </a>
  
  <div class="auth-container">
    
    <!-- Brand Section (Left) -->
    <div class="auth-brand-section">
      <div class="auth-brand-content">
        
        <div class="auth-logo">
          <div class="auth-logo-icon">🏠</div>
          <div class="auth-logo-text">Rentify</div>
        </div>
        
        <h1 class="auth-brand-title">Chào mừng quay lại!</h1>
        
        <p class="auth-brand-desc">
          Đăng nhập để quản lý phòng, đặt lịch xem và theo dõi hợp đồng của bạn
        </p>
        
        <div class="auth-brand-illustration">
          <i class="bi bi-house-door"></i>
        </div>
        
      </div>
    </div>
    
    <!-- Form Section (Right) -->
    <div class="auth-form-section">
      <div class="auth-card">
        
        <div class="auth-card-header">
          <h2 class="auth-card-title">Đăng nhập</h2>
          <p class="auth-card-subtitle">Nhập thông tin để tiếp tục</p>
        </div>
        
        <!-- Alert (hidden by default, show via JS) -->
        <div class="auth-alert auth-alert-error" id="errorAlert" style="display: none;">
          <i class="bi bi-exclamation-circle auth-alert-icon"></i>
          <div id="errorMessage"></div>
        </div>
        
        <form class="auth-form" id="loginForm">
          
          <!-- Email Input -->
          <div class="auth-form-group">
            <label class="auth-label">Email hoặc Tên đăng nhập</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-person auth-input-icon"></i>
              <input 
                type="text" 
                class="auth-input" 
                id="emailInput"
                placeholder="email@example.com hoặc username"
                required
              >
            </div>
          </div>
          
          <!-- Password Input -->
          <div class="auth-form-group">
            <label class="auth-label">Mật khẩu</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-lock auth-input-icon"></i>
              <input 
                type="password" 
                class="auth-input" 
                id="passwordInput"
                placeholder="Nhập mật khẩu"
                required
              >
              <button type="button" class="auth-password-toggle" id="togglePassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          
          <!-- Remember & Forgot -->
          <div class="auth-checkbox-group">
            <label class="auth-checkbox">
              <input type="checkbox" id="rememberMe">
              <span>Ghi nhớ đăng nhập</span>
            </label>
            <a href="forgot-password.html" class="auth-link">Quên mật khẩu?</a>
          </div>
          
          <!-- Submit Button -->
          <button type="submit" class="auth-btn auth-btn-primary">
            <span>Đăng nhập</span>
            <i class="bi bi-arrow-right"></i>
          </button>
          
          <!-- Divider -->
          <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">Hoặc đăng nhập với</span>
            <div class="auth-divider-line"></div>
          </div>
          
          <!-- Google Login -->
          <button type="button" class="auth-btn auth-btn-google">
            <svg width="20" height="20" viewBox="0 0 20 20">
              <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
              <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
              <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
              <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
            </svg>
            <span>Đăng nhập với Google</span>
          </button>
          
        </form>
        
        <!-- Footer Link -->
        <div class="auth-footer">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
        
      </div>
    </div>
    
  </div>
  
  <script src="../js/auth-script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      
      document.getElementById('errorAlert').style.display = 'none';
      
      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Đang đăng nhập...';
      
      try {
        const response = await fetch('../../backend/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || 'Đăng nhập thất bại');
        }

        // Additional security check: Verify role is Tenant before saving
        if (data.user.role !== 'Tenant') {
          throw new Error('Chỉ người thuê mới có thể đăng nhập ở trang này');
        }

        // Lưu thông tin user vào localStorage
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('isLoggedIn', 'true');

        showToast('Đăng nhập thành công!', 'success');

        // Chờ 1 giây rồi chuyển hướng
        setTimeout(() => {
          // Tenant redirect về index
          window.location.href = 'index.html';
        }, 1000);
        
      } catch (error) {
        document.getElementById('errorMessage').textContent = error.message;
        document.getElementById('errorAlert').style.display = 'flex';
        
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Đăng nhập</span><i class="bi bi-arrow-right"></i>';
        
        document.getElementById('emailInput').classList.add('error');
        document.getElementById('passwordInput').classList.add('error');
      }
    });
    
    document.querySelectorAll('.auth-input').forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
      });
    });
  </script>
</body>
</html>
