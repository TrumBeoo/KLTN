<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký Chủ nhà - Rentify</title>

  <link rel="stylesheet" href="../css/landlord-auth-styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="auth-page">


  <div class="auth-container">

    <!-- Brand Section (Left) -->
    <div class="auth-brand-section">
      <div class="auth-brand-content">

        <div class="auth-logo">
          <div class="auth-logo-icon">🏢</div>
          <div class="auth-logo-text">Rentify</div>
        </div>

        <h1 class="auth-brand-title">Bắt đầu quản lý phòng</h1>

        <p class="auth-brand-desc">
          Đăng ký tài khoản chủ nhà để bắt đầu đăng tin, quản lý phòng và theo dõi lịch xem phòng
        </p>

        <div class="auth-brand-illustration">
          <i class="bi bi-houses"></i>
        </div>

      </div>
    </div>

    <!-- Form Section (Right) -->
    <div class="auth-form-section">
      <div class="auth-card">

        <div class="auth-card-header">
          <h2 class="auth-card-title">Đăng ký</h2>
          <p class="auth-card-subtitle">Tạo tài khoản chủ nhà để bắt đầu</p>
        </div>

        <!-- Alert (hidden by default) -->
        <div class="auth-alert auth-alert-error" id="errorAlert" style="display: none;">
          <i class="bi bi-exclamation-circle auth-alert-icon"></i>
          <div id="errorMessage"></div>
        </div>

        <form class="auth-form" id="registerForm">

          <!-- Username Input -->
          <div class="auth-form-group">
            <label class="auth-label">Tên đăng nhập</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-at auth-input-icon"></i>
              <input
                type="text"
                class="auth-input"
                id="usernameInput"
                placeholder="tênđăngnnập"
                required
              >
            </div>
          </div>

          <!-- Full Name Input -->
          <div class="auth-form-group">
            <label class="auth-label">Họ và tên</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-person auth-input-icon"></i>
              <input
                type="text"
                class="auth-input"
                id="nameInput"
                placeholder="Nguyễn Văn A"
                required
              >
            </div>
          </div>

          <!-- Email Input -->
          <div class="auth-form-group">
            <label class="auth-label">Email</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-envelope auth-input-icon"></i>
              <input
                type="email"
                class="auth-input"
                id="emailInput"
                placeholder="email@example.com"
                required
              >
            </div>
          </div>

          <!-- Phone Input -->
          <div class="auth-form-group">
            <label class="auth-label">Số điện thoại</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-telephone auth-input-icon"></i>
              <input
                type="tel"
                class="auth-input"
                id="phoneInput"
                placeholder="0912345678"
                required
              >
            </div>
          </div>

          <!-- Password Input -->
          <div class="auth-form-group">
            <label class="auth-label">Mật khẩu</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-lock auth-input-icon"></i>
              <input
                type="password"
                class="auth-input"
                id="passwordInput"
                placeholder="Nhập mật khẩu"
                required
              >
              <button type="button" class="auth-password-toggle" id="togglePassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <!-- Password Strength Indicator -->
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <div class="strength-text" id="strengthText">Độ mạnh: Chưa nhập</div>
          </div>

          <!-- Confirm Password Input -->
          <div class="auth-form-group">
            <label class="auth-label">Xác nhận mật khẩu</label>
            <div class="auth-input-wrapper">
              <i class="bi bi-lock-check auth-input-icon"></i>
              <input
                type="password"
                class="auth-input"
                id="confirmPasswordInput"
                placeholder="Nhập lại mật khẩu"
                required
              >
            </div>
          </div>

          <!-- Terms Checkbox -->
          <div class="auth-form-group">
            <label class="auth-checkbox">
              <input type="checkbox" id="termsCheckbox" required>
              <span>Tôi đồng ý với <a href="#" class="auth-link">Điều khoản sử dụng</a> và <a href="#" class="auth-link">Chính sách bảo mật</a></span>
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="auth-btn auth-btn-primary">
            <span>Đăng ký</span>
            <i class="bi bi-arrow-right"></i>
          </button>

          <!-- Divider -->
          <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">Hoặc đăng ký với</span>
            <div class="auth-divider-line"></div>
          </div>

          <!-- Google Login -->
          <button type="button" class="auth-btn auth-btn-google">
            <svg width="20" height="20" viewBox="0 0 20 20">
              <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
              <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
              <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
              <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
            </svg>
            <span>Đăng ký với Google</span>
          </button>

        </form>

        <!-- Footer Link -->
        <div class="auth-footer">
          Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>

      </div>
    </div>

  </div>

  <script src="../js/auth-script.js"></script>
  <script>
    // Password visibility toggle
    document.getElementById('togglePassword').addEventListener('click', function(e) {
      e.preventDefault();
      const passwordInput = document.getElementById('passwordInput');
      const icon = this.querySelector('i');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      }
    });

    // Password strength indicator
    function calculatePasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;
      return Math.min(Math.floor(strength / 1.25), 4);
    }

    const passwordInput = document.getElementById('passwordInput');
    const strengthBars = document.querySelectorAll('.strength-bar');
    const strengthText = document.getElementById('strengthText');
    const strengthLabels = ['Chưa nhập', 'Yếu', 'Trung bình', 'Mạnh', 'Rất mạnh'];

    passwordInput.addEventListener('input', function() {
      const strength = calculatePasswordStrength(this.value);
      strengthBars.forEach((bar, index) => {
        if (index < strength) {
          bar.classList.add('active');
          if (strength === 1) bar.classList.add('weak');
          else if (strength === 2) bar.classList.add('medium');
          else bar.classList.add('strong');
        } else {
          bar.classList.remove('active', 'weak', 'medium', 'strong');
        }
      });
      strengthText.textContent = 'Độ mạnh: ' + strengthLabels[strength];
    });

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username = document.getElementById('usernameInput').value.trim();
      const name = document.getElementById('nameInput').value.trim();
      const email = document.getElementById('emailInput').value.trim();
      const phone = document.getElementById('phoneInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const confirmPassword = document.getElementById('confirmPasswordInput').value;
      const termsCheckbox = document.getElementById('termsCheckbox').checked;

      document.getElementById('errorAlert').style.display = 'none';

      // Validation
      if (!username || !name || !email || !phone || !password || !confirmPassword) {
        showError('Vui lòng nhập đầy đủ thông tin');
        return;
      }

      if (password !== confirmPassword) {
        showError('Mật khẩu xác nhận không khớp');
        return;
      }

      if (password.length < 8) {
        showError('Mật khẩu phải có ít nhất 8 ký tự');
        return;
      }

      if (!termsCheckbox) {
        showError('Vui lòng đồng ý với Điều khoản sử dụng');
        return;
      }

      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Đang đăng ký...';

      try {
        const response = await fetch('../../backend/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            name,
            email,
            phone,
            password,
            role: 'Landlord'
          })
        });

        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || 'Đăng ký thất bại');
        }

        if (typeof showToast === 'function') {
          showToast('Đăng ký thành công! Chuyển hướng đến trang đăng nhập...', 'success');
        }

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (error) {
        showError(error.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Đăng ký</span><i class="bi bi-arrow-right"></i>';
      }
    });

    function showError(message) {
      document.getElementById('errorMessage').textContent = message;
      document.getElementById('errorAlert').style.display = 'flex';
    }

    // Clear error on input
    document.querySelectorAll('.auth-input').forEach(input => {
      input.addEventListener('input', () => {
        if (document.getElementById('errorAlert').style.display !== 'none') {
          input.classList.remove('error');
        }
      });
    });

    // Phone number formatting for Vietnam
    document.getElementById('phoneInput').addEventListener('input', function() {
      let value = this.value.replace(/\D/g, '');
      if (value.startsWith('0')) {
        value = '+84' + value.substring(1);
      } else if (!value.startsWith('+')) {
        value = value.replace(/^(\d{1,3})(\d+)/, '$1$2');
      }
      this.value = value.substring(0, 13);
    });
  </script>
</body>
</html>
